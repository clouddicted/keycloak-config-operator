name: CI

"on":
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  HELM_VERSION: "v4.1.3"
  KIND_VERSION: "v0.31.0"
  KUBECTL_VERSION: "v1.35.0"
  CHART_PATH: charts/keycloak-config-operator
  CHART_REGISTRY: oci://ghcr.io/clouddicted/charts
  IMAGE_NAME: ghcr.io/clouddicted/keycloak-config-operator
  KEYCLOAK_VERSION: "26.6.2"
  KEYCLOAK_COMPATIBILITY_VERSION: "26.5.3"

jobs:
  python:
    name: Python lint and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build

      - name: Lint Python
        run: ruff check .

      - name: Run unit tests
        run: pytest

      - name: Build Python package
        run: python -m build

  helm:
    name: Helm lint and package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint chart
        run: helm lint "$CHART_PATH"

      - name: Render chart
        run: |
          helm template keycloak-config-operator "$CHART_PATH" --include-crds
          helm template keycloak-config-operator "$CHART_PATH" \
            --set 'watchNamespaces[0]=team-a' \
            --set 'watchNamespaces[1]=team-b'

      - name: Package chart
        run: |
          mkdir -p dist
          helm package "$CHART_PATH" --destination dist

      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-chart
          path: dist/*.tgz
          if-no-files-found: error

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[docs]"

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs:
      - docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  image:
    name: Container image build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  kind:
    name: kind e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - python
      - helm
      - docs
      - image
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install kind and kubectl
        run: |
          curl -fsSLo kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          kind version
          kubectl version --client=true

      - name: Prepare kind cluster
        env:
          KEYCLOAK_VERSION: ${{ env.KEYCLOAK_VERSION }}
        run: python tests/kind/e2e.py prepare

      - name: Run kind tests
        env:
          KEYCLOAK_VERSION: ${{ env.KEYCLOAK_VERSION }}
        run: python tests/kind/e2e.py test

      - name: Collect diagnostics
        if: failure()
        run: |
          kubectl --context kind-clouddicted-keycloak-config-operator-it get pods -A || true
          kubectl --context kind-clouddicted-keycloak-config-operator-it \
            -n keycloak-config-operator-system \
            logs deployment/keycloak-config-operator || true
          kubectl --context kind-clouddicted-keycloak-config-operator-it \
            -n keycloak-operator-test \
            logs deployment/keycloak || true

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name clouddicted-keycloak-config-operator-it || true

  keycloak-compatibility:
    name: Keycloak compatibility e2e tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref_type == 'tag')
    needs:
      - python
      - helm
      - docs
      - image
    strategy:
      fail-fast: false
      matrix:
        keycloak-version:
          - "26.5.3"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install kind and kubectl
        run: |
          curl -fsSLo kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x kind
          sudo mv kind /usr/local/bin/kind

          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

          kind version
          kubectl version --client=true

      - name: Prepare kind cluster
        env:
          KEYCLOAK_VERSION: ${{ matrix.keycloak-version }}
        run: python tests/kind/e2e.py prepare

      - name: Run kind tests
        env:
          KEYCLOAK_VERSION: ${{ matrix.keycloak-version }}
        run: python tests/kind/e2e.py test

      - name: Collect diagnostics
        if: failure()
        run: |
          kubectl --context kind-clouddicted-keycloak-config-operator-it get pods -A || true
          kubectl --context kind-clouddicted-keycloak-config-operator-it \
            -n keycloak-config-operator-system \
            logs deployment/keycloak-config-operator || true
          kubectl --context kind-clouddicted-keycloak-config-operator-it \
            -n keycloak-operator-test \
            logs deployment/keycloak || true

      - name: Delete kind cluster
        if: always()
        run: kind delete cluster --name clouddicted-keycloak-config-operator-it || true

  release:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - python
      - helm
      - docs
      - image
      - kind
      - keycloak-compatibility
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Validate release version
        run: |
          python -m pip install pyyaml
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          import yaml

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag.removeprefix("v")

          pyproject = tomllib.loads(Path("pyproject.toml").read_text())
          chart = yaml.safe_load(Path("charts/keycloak-config-operator/Chart.yaml").read_text())

          if pyproject["project"]["version"] != version:
              raise SystemExit(f"pyproject version does not match tag {tag}")
          if chart["version"] != version:
              raise SystemExit(f"chart version does not match tag {tag}")
          if chart["appVersion"] != tag:
              raise SystemExit(f"chart appVersion does not match tag {tag}")
          PY

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Package chart
        run: |
          mkdir -p dist
          helm package "$CHART_PATH" --destination dist

      - name: Publish Helm chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

          chart_version="${GITHUB_REF_NAME#v}"
          helm push "dist/keycloak-config-operator-${chart_version}.tgz" "$CHART_REGISTRY"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate release image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.tgz --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/*.tgz \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
