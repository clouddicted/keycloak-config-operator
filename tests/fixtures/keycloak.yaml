apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: keycloak-operator-test
  labels:
    app.kubernetes.io/name: keycloak-fixture
    app.kubernetes.io/part-of: keycloak-config-operator-tests
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak-fixture
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-fixture
        app.kubernetes.io/part-of: keycloak-config-operator-tests
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0.7
          args:
            - start-dev
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-credentials
                  key: username
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-credentials
                  key: password
          ports:
            - name: http
              containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: keycloak-operator-test
  labels:
    app.kubernetes.io/name: keycloak-fixture
    app.kubernetes.io/part-of: keycloak-config-operator-tests
spec:
  selector:
    app.kubernetes.io/name: keycloak-fixture
  ports:
    - name: http
      port: 8080
      targetPort: http
