apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloakprotocolmappers.keycloak.clouddicted.com
spec:
  group: keycloak.clouddicted.com
  scope: Namespaced
  names:
    kind: KeycloakProtocolMapper
    plural: keycloakprotocolmappers
    singular: keycloakprotocolmapper
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Mapper
          type: string
          jsonPath: .spec.name
        - name: Realm
          type: string
          jsonPath: .spec.realm
        - name: Parent
          type: string
          jsonPath: .spec.parent.type
        - name: Target
          type: string
          jsonPath: .spec.targetRef.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: Desired Keycloak protocol mapper.
              required:
                - targetRef
                - realm
                - name
                - mapperType
                - parent
              properties:
                targetRef:
                  type: object
                  description: KeycloakTarget used to reach Keycloak.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the KeycloakTarget in this namespace.
                      minLength: 1
                realm:
                  type: string
                  description: Realm containing the mapper parent.
                  minLength: 1
                name:
                  type: string
                  description: Keycloak protocol mapper name.
                  minLength: 1
                mapperType:
                  type: string
                  description: Keycloak protocol mapper type.
                  minLength: 1
                protocol:
                  type: string
                  description: Protocol used by the mapper.
                  default: openid-connect
                  minLength: 1
                config:
                  type: object
                  description: Mapper configuration key-value pairs.
                  additionalProperties:
                    type: string
                    description: Mapper configuration value.
                parent:
                  type: object
                  description: Client or client scope that owns the mapper.
                  required:
                    - type
                  properties:
                    type:
                      type: string
                      description: Parent resource type.
                      enum:
                        - Client
                        - ClientScope
                    clientRef:
                      type: object
                      description: Parent KeycloakClient reference.
                      required:
                        - name
                      properties:
                        name:
                          type: string
                          description: Name of the KeycloakClient in this namespace.
                          minLength: 1
                    clientScopeRef:
                      type: object
                      description: Parent KeycloakClientScope reference.
                      required:
                        - name
                      properties:
                        name:
                          type: string
                          description: Name of the KeycloakClientScope in this namespace.
                          minLength: 1
            status:
              type: object
              description: Observed KeycloakProtocolMapper status.
              properties:
                conditions:
                  type: array
                  description: Current readiness and reconciliation conditions.
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                        description: Condition type.
                        minLength: 1
                      status:
                        type: string
                        description: Condition status.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        description: Resource generation observed by the operator.
                        format: int64
                        minimum: 0
                      lastTransitionTime:
                        type: string
                        description: Time when the condition last changed.
                        format: date-time
                      reason:
                        type: string
                        description: Short reason for the condition state.
                        minLength: 1
                      message:
                        type: string
                        description: Human-readable condition details.
