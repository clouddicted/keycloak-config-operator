replicaCount: 1

image:
  repository: ghcr.io/clouddicted/keycloak-config-operator
  pullPolicy: IfNotPresent
  tag: ""

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

rbac:
  create: true

watchNamespaces: []

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources: {}

extraEnv: []
extraArgs: []

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
