apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloakclients.keycloak.clouddicted.com
spec:
  group: keycloak.clouddicted.com
  scope: Namespaced
  names:
    kind: KeycloakClient
    plural: keycloakclients
    singular: keycloakclient
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Client ID
          type: string
          jsonPath: .spec.clientId
        - name: Realm
          type: string
          jsonPath: .spec.realm
        - name: Type
          type: string
          jsonPath: .spec.clientType
        - name: Remote ID
          type: string
          jsonPath: .status.remoteId
          priority: 1
        - name: Target
          type: string
          jsonPath: .spec.targetRef.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: Desired Keycloak client.
              required:
                - targetRef
                - realm
                - clientId
              properties:
                targetRef:
                  type: object
                  description: KeycloakTarget used to reach Keycloak.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the KeycloakTarget in this namespace.
                      minLength: 1
                realm:
                  type: string
                  description: Realm containing the client.
                  minLength: 1
                clientId:
                  type: string
                  description: Keycloak client ID.
                  minLength: 1
                clientType:
                  type: string
                  description: Client access type.
                  default: Public
                  enum:
                    - Public
                    - Confidential
                managementPolicy:
                  type: string
                  description: Whether the operator reconciles or only observes the client.
                  default: Reconcile
                  enum:
                    - Reconcile
                    - ObserveOnly
                deletionPolicy:
                  type: string
                  description: What happens to the Keycloak client when this resource is deleted.
                  default: Orphan
                  enum:
                    - Orphan
                    - Delete
                displayName:
                  type: string
                  description: Display name stored as the Keycloak client name.
                  minLength: 1
                secretRef:
                  type: object
                  description: Secret containing the confidential client secret.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Secret name.
                      minLength: 1
                    namespace:
                      type: string
                      description: Secret namespace. Defaults to this resource namespace.
                      minLength: 1
                    secretKey:
                      type: string
                      description: Secret key containing the client secret.
                      minLength: 1
                redirectUris:
                  type: array
                  description: Allowed redirect URI patterns.
                  items:
                    type: string
                    minLength: 1
                webOrigins:
                  type: array
                  description: Allowed web origins.
                  items:
                    type: string
                    minLength: 1
            status:
              type: object
              description: Observed KeycloakClient status.
              properties:
                remoteId:
                  type: string
                  description: Keycloak internal ID of the observed client.
                conditions:
                  type: array
                  description: Current readiness and reconciliation conditions.
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                        description: Condition type.
                        minLength: 1
                      status:
                        type: string
                        description: Condition status.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        description: Resource generation observed by the operator.
                        format: int64
                        minimum: 0
                      lastTransitionTime:
                        type: string
                        description: Time when the condition last changed.
                        format: date-time
                      reason:
                        type: string
                        description: Short reason for the condition state.
                        minLength: 1
                      message:
                        type: string
                        description: Human-readable condition details.
