apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloakclients.keycloak.clouddicted.com
spec:
  group: keycloak.clouddicted.com
  scope: Namespaced
  names:
    kind: KeycloakClient
    plural: keycloakclients
    singular: keycloakclient
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Client ID
          type: string
          jsonPath: .spec.clientId
        - name: Realm
          type: string
          jsonPath: .spec.realm
        - name: Type
          type: string
          jsonPath: .spec.clientType
        - name: Target
          type: string
          jsonPath: .spec.targetRef.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - targetRef
                - realm
                - clientId
              properties:
                targetRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      minLength: 1
                realm:
                  type: string
                  minLength: 1
                clientId:
                  type: string
                  minLength: 1
                clientType:
                  type: string
                  default: Public
                  enum:
                    - Public
                    - Confidential
                managementPolicy:
                  type: string
                  default: Reconcile
                  enum:
                    - Reconcile
                    - ObserveOnly
                deletionPolicy:
                  type: string
                  default: Orphan
                  enum:
                    - Orphan
                    - Delete
                displayName:
                  type: string
                  minLength: 1
                secretRef:
                  type: object
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      minLength: 1
                    namespace:
                      type: string
                      minLength: 1
                    secretKey:
                      type: string
                      minLength: 1
                redirectUris:
                  type: array
                  items:
                    type: string
                    minLength: 1
                webOrigins:
                  type: array
                  items:
                    type: string
                    minLength: 1
            status:
              type: object
              properties:
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                        minLength: 1
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        format: int64
                        minimum: 0
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                        minLength: 1
                      message:
                        type: string
