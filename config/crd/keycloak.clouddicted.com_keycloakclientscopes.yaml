apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloakclientscopes.keycloak.clouddicted.com
spec:
  group: keycloak.clouddicted.com
  scope: Namespaced
  names:
    kind: KeycloakClientScope
    plural: keycloakclientscopes
    singular: keycloakclientscope
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Scope
          type: string
          jsonPath: .spec.name
        - name: Realm
          type: string
          jsonPath: .spec.realm
        - name: Protocol
          type: string
          jsonPath: .spec.protocol
        - name: Target
          type: string
          jsonPath: .spec.targetRef.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: Desired Keycloak client scope.
              required:
                - targetRef
                - realm
                - name
              properties:
                targetRef:
                  type: object
                  description: KeycloakTarget used to reach Keycloak.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the KeycloakTarget in this namespace.
                      minLength: 1
                realm:
                  type: string
                  description: Realm containing the client scope.
                  minLength: 1
                name:
                  type: string
                  description: Keycloak client scope name.
                  minLength: 1
                description:
                  type: string
                  description: Keycloak client scope description.
                  minLength: 1
                protocol:
                  type: string
                  description: Client scope protocol.
                  default: openid-connect
                  minLength: 1
            status:
              type: object
              description: Observed KeycloakClientScope status.
              properties:
                conditions:
                  type: array
                  description: Current readiness and reconciliation conditions.
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                        description: Condition type.
                        minLength: 1
                      status:
                        type: string
                        description: Condition status.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        description: Resource generation observed by the operator.
                        format: int64
                        minimum: 0
                      lastTransitionTime:
                        type: string
                        description: Time when the condition last changed.
                        format: date-time
                      reason:
                        type: string
                        description: Short reason for the condition state.
                        minLength: 1
                      message:
                        type: string
                        description: Human-readable condition details.
