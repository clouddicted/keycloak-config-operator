apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: keycloakrealms.keycloak.clouddicted.com
spec:
  group: keycloak.clouddicted.com
  scope: Namespaced
  names:
    kind: KeycloakRealm
    plural: keycloakrealms
    singular: keycloakrealm
  versions:
    - name: v1beta1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Realm
          type: string
          jsonPath: .spec.realm
        - name: Target
          type: string
          jsonPath: .spec.targetRef.name
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: Desired Keycloak realm.
              required:
                - targetRef
                - realm
              properties:
                targetRef:
                  type: object
                  description: KeycloakTarget used to reach Keycloak.
                  required:
                    - name
                  properties:
                    name:
                      type: string
                      description: Name of the KeycloakTarget in this namespace.
                      minLength: 1
                realm:
                  type: string
                  description: Keycloak realm name.
                  minLength: 1
                managementPolicy:
                  type: string
                  description:
                    Reconciliation behavior for the remote Keycloak realm.
                    Reconcile creates or updates the modeled fields; ObserveOnly
                    reports missing resources or drift without changing Keycloak.
                  default: Reconcile
                  enum:
                    - Reconcile
                    - ObserveOnly
                displayName:
                  type: string
                  description: Display name reconciled when set.
                  minLength: 1
            status:
              type: object
              description: Observed KeycloakRealm status.
              properties:
                conditions:
                  type: array
                  description: Current Kubernetes-style status conditions.
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                        description: Condition type.
                        minLength: 1
                      status:
                        type: string
                        description: Condition status.
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      observedGeneration:
                        type: integer
                        description: Resource generation observed by the operator.
                        format: int64
                        minimum: 0
                      lastTransitionTime:
                        type: string
                        description: Time when the condition last changed.
                        format: date-time
                      reason:
                        type: string
                        description: Short reason for the condition state.
                        minLength: 1
                      message:
                        type: string
                        description: Human-readable condition details.
